<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicons: square PNG + ICO for Google SERP (needs ≥48×48 square); SVG optional for browsers -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="/LC.svg" sizes="any" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Crawl hint in first HTML (before React). Per-route title/canonical/OG still set in Seo.jsx after load. -->
    <meta name="robots" content="index, follow" />
    <meta name="description" content="UK-based web and app development agency — strategy, UI/UX design, and engineering. Logix Contact builds digital products for businesses across the United Kingdom." />
    <meta name="keywords" content="web development agency UK, app development UK, UI UX design, digital agency United Kingdom" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="geo.region" content="GB" />
    <meta name="language" content="English" />
    <title>Logix Contact — Web &amp; App Development Agency UK</title>
    <!-- Static social / crawl hints before JS (Seo.jsx updates per route after hydration) -->
    <link rel="canonical" href="__SITE_ORIGIN__/" />
    <link rel="alternate" hreflang="en-GB" href="__SITE_ORIGIN__/" />
    <link rel="alternate" hreflang="x-default" href="__SITE_ORIGIN__/" />
    <meta property="og:title" content="Logix Contact — Web &amp; App Development Agency UK" />
    <meta
      property="og:description"
      content="UK-based web and app development agency — strategy, UI/UX design, and engineering. Logix Contact builds digital products for businesses across the United Kingdom."
    />
    <meta property="og:url" content="__SITE_ORIGIN__/" />
    <!-- SPA: same index.html for all routes — sync crawl hints to the actual URL before React loads (fixes GSC "alternate canonical"). -->
    <script>
      (function () {
        var prod = '__SITE_ORIGIN__';
        var host = location.hostname;
        var origin =
          host === 'localhost' || host === '127.0.0.1' || /\.local$/i.test(host) ? location.origin : prod;
        var url = (origin + location.pathname + location.search).split('#')[0];
        document.querySelectorAll('link[rel="canonical"]').forEach(function (el) {
          el.setAttribute('href', url);
        });
        document.querySelectorAll('link[rel="alternate"][hreflang]').forEach(function (el) {
          el.setAttribute('href', url);
        });
        var ogUrl = document.querySelector('meta[property="og:url"]');
        if (ogUrl) ogUrl.setAttribute('content', url);
      })();
    </script>
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:image" content="__SITE_ORIGIN__/LC.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Logix Contact — Web &amp; App Development Agency UK" />
    <meta
      name="twitter:description"
      content="UK-based web and app development agency — strategy, UI/UX design, and engineering."
    />
    <meta name="twitter:image" content="__SITE_ORIGIN__/LC.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Tech icons (below fold) use jsdelivr/simpleicons; omit early preconnect to avoid unused connection work on mobile. -->
    <!-- Non-blocking stylesheet: improves FCP on slow networks (fonts still swap in). -->
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
